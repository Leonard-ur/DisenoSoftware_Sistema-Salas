<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Coordinador | UCT</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-950 text-zinc-300 flex h-screen overflow-hidden antialiased">

    <aside class="w-64 bg-zinc-950 border-r border-zinc-800 flex flex-col hidden md:flex z-20">
        <div class="p-6 flex items-center border-b border-zinc-800">
            <div class="text-xl font-semibold text-zinc-100 flex items-center gap-2">
                <i data-lucide="layers" class="w-5 h-5 text-zinc-400"></i>
                UCT<span class="font-normal text-zinc-500">Coord</span>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-1" id="nav-coordinador">
            <a href="#" data-target="view-panel"
                class="flex items-center gap-3 px-3 py-2 bg-zinc-800 text-zinc-100 rounded-lg font-medium transition-colors">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Panel General
            </a>
            <a href="#" data-target="view-pendientes"
                class="flex items-center gap-3 px-3 py-2 text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200 rounded-lg transition-colors">
                <i data-lucide="list-todo" class="w-4 h-4"></i> Solicitudes Pendientes
            </a>
            <a href="./#" data-target="view-mapa"
                class="flex items-center gap-3 px-3 py-2 text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200 rounded-lg transition-colors">
                <i data-lucide="map" class="w-4 h-4"></i> Inventario de Aulas
            </a>
        </nav>
        <div class="p-4 border-t border-zinc-800">
            <a href="#" id="btn-logout" class="flex items-center gap-3 px-3 py-2 text-zinc-400 hover:text-zinc-200 transition-colors cursor-pointer">
                <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto relative bg-gray-950">

        <header
            class="bg-gray-950 backdrop-blur-md border-b border-zinc-800 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 id="header-title" class="text-xl font-semibold text-zinc-100">Panel General</h1>
            <div class="flex items-center gap-4 border-l border-zinc-800 pl-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-medium text-zinc-200" id="header-user-name">Coordinador</p>
                    <p class="text-xs text-zinc-500">Coordinación Académica</p>
                </div>
                <div
                    class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center text-sm font-medium text-zinc-300 border border-zinc-700"
                    id="header-user-initials">
                    CO
                </div>
            </div>
        </header>

        <div id="contenedor-principal" class="p-8 w-full max-w-6xl mx-auto flex-1">
        </div>

        <div id="modalMotor"
            class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
            <div class="bg-zinc-950 border border-zinc-800 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl">
                <div class="px-6 py-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                    <h3 class="text-base font-medium text-zinc-100 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4 text-zinc-400"></i> Motor de Asignación
                    </h3>
                    <button id="btnCerrarX" class="text-zinc-500 hover:text-zinc-300 transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div class="p-6">
                    <div id="loaderMotor" class="text-center py-8">
                        <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto text-zinc-500 mb-4"></i>
                        <p class="text-zinc-400 text-sm">Buscando la mejor sala...</p>
                    </div>
                    <div id="resultadoMotor" class="hidden">
                        <!-- Content injected by JS -->
                    </div>
                </div>
                <div class="px-6 py-4 border-t border-zinc-800 bg-zinc-900/30 flex justify-end gap-3">
                    <button id="btnCancelarModal" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-zinc-100 transition-colors">
                        Cancelar
                    </button>
                    <button id="btnConfirmarAsignacion" class="hidden px-4 py-2 text-sm font-medium bg-emerald-500 hover:bg-emerald-400 text-zinc-950 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="check" class="w-4 h-4"></i> Asignar Sala
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal Confirmación Cerrar Sesión -->
        <div id="modalLogout"
            class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
            <div class="bg-zinc-950 border border-zinc-800 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl p-6 text-center">
                <div class="w-12 h-12 rounded-full bg-rose-500/10 flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="log-out" class="w-6 h-6 text-rose-500"></i>
                </div>
                <h3 class="text-lg font-semibold text-zinc-100 mb-2">¿Cerrar sesión?</h3>
                <p class="text-sm text-zinc-400 mb-6">¿Estás seguro que deseas salir del sistema?</p>
                <div class="flex gap-3 justify-center">
                    <button id="btnCancelarLogout" class="px-4 py-2 text-sm font-medium text-zinc-300 hover:text-zinc-100 bg-zinc-800 hover:bg-zinc-700 rounded-lg transition-colors flex-1">
                        Cancelar
                    </button>
                    <button id="btnConfirmarLogout" class="px-4 py-2 text-sm font-medium text-white bg-rose-500 hover:bg-rose-600 rounded-lg transition-colors flex-1">
                        Sí, salir
                    </button>
                </div>
            </div>
        </div>

    </main>


    <script type="module">
        import { cargarInventarioSalas, cargarPanelCoordinador, inicializarSolicitudesPendientes } from '../../services/coordinador.js';
        import { initRouter } from '../../services/router.js';
        import { authService } from '../../services/authService.js';

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // Setup user data in header
            const userName = localStorage.getItem('userName') || 'Coordinador';
            document.getElementById('header-user-name').textContent = userName;
            const initials = userName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('header-user-initials').textContent = initials;

            const rutas = {
                'view-panel': 'panel_general.html',
                'view-pendientes': 'solicitudes_pendientes.html',
                'view-mapa': 'inventario.html'
            };

            const callbacks = {
                'view-panel': cargarPanelCoordinador,
                'view-mapa': cargarInventarioSalas,
                'view-pendientes': inicializarSolicitudesPendientes
            };

            // Iniciar navegación
            initRouter(rutas, callbacks);

            // Lógica Cerrar Sesión
            const btnLogout = document.getElementById('btn-logout');
            const modalLogout = document.getElementById('modalLogout');
            const btnCancelarLogout = document.getElementById('btnCancelarLogout');
            const btnConfirmarLogout = document.getElementById('btnConfirmarLogout');

            if (btnLogout) {
                btnLogout.addEventListener('click', (e) => {
                    e.preventDefault();
                    modalLogout.classList.remove('hidden');
                });
            }

            if (btnCancelarLogout) {
                btnCancelarLogout.addEventListener('click', () => {
                    modalLogout.classList.add('hidden');
                });
            }

            if (btnConfirmarLogout) {
                btnConfirmarLogout.addEventListener('click', () => {
                    authService.logout();
                });
            }
        });
    </script>

</body>

</html>
