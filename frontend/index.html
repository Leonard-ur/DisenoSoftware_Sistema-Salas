<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asignación de Salas</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body>

    <div class="min-h-screen bg-gray-950 flex items-center justify-center p-4">

        <div class="bg-zinc-900 border border-zinc-700 rounded-xl shadow-sm w-full max-w-md p-8 sm:p-10">

            <h1 class="text-2xl sm:text-3xl font-semibold text-zinc-100 mb-2 text-center">
                Iniciar sesión
            </h1>
            <p class="text-sm text-zinc-400 mb-8 text-center">
                Ingresa tus credenciales para acceder al sistema.
            </p>

            <!-- Mensaje de error (oculto por defecto) -->
            <div id="mensajeError" class="hidden mb-4 p-3 bg-rose-500/10 border border-rose-500/20 rounded-lg text-rose-400 text-sm text-center"></div>

            <form id="formLogin" class="flex flex-col gap-5">

                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-sm font-medium text-zinc-400">Usuario</label>
                    <input type="text" id="username" name="username"
                        class="px-3 py-2 bg-zinc-800 text-zinc-200 border border-zinc-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:border-transparent transition-colors"
                        required>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-sm font-medium text-zinc-400">Contraseña</label>
                    <input type="password" id="password" name="password"
                        class="px-3 py-2 bg-zinc-800 text-zinc-200 border border-zinc-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-zinc-500 focus:border-transparent transition-colors"
                        required>
                </div>

                <button id="btnLogin" type="submit"
                    class="mt-2 w-full bg-zinc-700 hover:bg-zinc-600 text-zinc-100 font-medium py-2.5 rounded-lg text-sm transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m10 17 5-5-5-5" />
                        <path d="M15 12H3" />
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                    </svg>
                    Ingresar
                </button>
            </form>

            <div class="mt-6 text-sm text-center text-zinc-400">
                <a href="#"
                    class="font-medium underline decoration-zinc-600 underline-offset-4 hover:text-zinc-200 hover:decoration-zinc-400 transition-colors">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

        </div>
    </div>

    <script type="module">
        import { authService } from './src/services/authService.js';

        const formLogin    = document.getElementById('formLogin');
        const btnLogin     = document.getElementById('btnLogin');
        const mensajeError = document.getElementById('mensajeError');

        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Estado de carga
            const textoOriginal = btnLogin.innerHTML;
            btnLogin.innerHTML = '<svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg> Verificando...';
            btnLogin.disabled = true;
            mensajeError.classList.add('hidden');

            try {
                await authService.login(user, pass);

                const rol = authService.getRole();

                // FIX: Las rutas eran '/coordinador.html' y '/docente.html' (no existen).
                // Se corrigen a las rutas reales de las páginas del proyecto.
                if (rol === 'COORDINADOR') {
                    window.location.href = './src/pages/Coordinador/coord.html';
                } else {
                    window.location.href = './src/pages/Docente/inicio.html';
                }
            } catch (error) {
                mensajeError.textContent = 'Usuario o contraseña incorrectos. Inténtalo de nuevo.';
                mensajeError.classList.remove('hidden');
                btnLogin.innerHTML = textoOriginal;
                btnLogin.disabled = false;
            }
        });
    </script>
</body>

</html>
