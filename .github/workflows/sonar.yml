name: CI/CD - SonarQube Analysis

# Se ejecuta en cada push y pull_request hacia las ramas de integracion y produccion.
# workflow_dispatch permite lanzarlo manualmente desde la pestana Actions.
on:
  push:
    branches: [integration, main]
  pull_request:
    branches: [integration, main]
  workflow_dispatch:

jobs:
  quality:
    name: Tests, Lint & SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      # 1. Clona el repositorio. fetch-depth: 0 trae todo el historial,
      #    necesario para que SonarQube calcule el "blame" y el codigo nuevo.
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Configura el interprete de Python que usa el backend.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # 3. Instala dependencias de la app + herramientas de calidad (CI, no app).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      # 4. PEP 8 estricto + complejidad ciclomatica < 10 por funcion.
      #    flake8 reporta cualquier funcion cuya complejidad supere el umbral,
      #    bloqueando el pipeline antes de llegar a SonarQube.
      - name: Lint (PEP 8 + cyclomatic complexity)
        run: |
          flake8 backend \
            --max-line-length=100 \
            --max-complexity=10 \
            --extend-exclude=frontend,venv,.venv,__pycache__ \
            --show-source \
            --statistics

      # 5. Ejecuta las pruebas y genera coverage.xml para SonarQube.
      #    El codigo de salida 5 de pytest significa "no se encontraron pruebas":
      #    se tolera mientras la suite de tests esta en construccion.
      - name: Run tests with coverage
        run: |
          set +e
          pytest --cov=backend --cov-report=xml --cov-report=term-missing
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then
            exit "$status"
          fi
          if [ "$status" -eq 5 ]; then
            echo "::warning::No se encontraron pruebas todavia. SonarQube correra sin datos de cobertura."
          fi

      # 6. Analisis de SonarQube. El token y la URL del servidor llegan
      #    exclusivamente desde los Secrets del repositorio (nunca en texto plano).
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # 7. Verifica el Quality Gate (complejidad, duplicacion, bugs, code smells).
      #    Si el proyecto no cumple el gate definido en el servidor, el job falla.
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 8. Resumen final con el enlace al dashboard del proyecto.
      - name: Report results
        if: always()
        run: |
          echo "Analisis de SonarQube completado."
          echo "Dashboard: ${{ secrets.SONAR_HOST_URL }}/dashboard?id=DisenoSoftware_Sistema-Salas"
