# ─────────────────────────────────────────────────────────────
#  Identificacion del proyecto
# ─────────────────────────────────────────────────────────────
sonar.projectKey=DisenoSoftware_Sistema-Salas
sonar.projectName=Sistema de Salas - Backend FastAPI
sonar.projectVersion=0.1.0

# ─────────────────────────────────────────────────────────────
#  Codigo fuente y codificacion
# ─────────────────────────────────────────────────────────────
# Solo se analiza el backend (FastAPI). La URL del servidor y el token
# NO se definen aqui: se inyectan desde los Secrets en el workflow.
sonar.sources=backend
sonar.python.version=3.13
sonar.sourceEncoding=UTF-8

# ─────────────────────────────────────────────────────────────
#  Exclusiones del analisis
# ─────────────────────────────────────────────────────────────
# Se excluye el frontend y el entorno virtual (requisito), ademas de
# cache de Python, bytecode y bases de datos SQLite locales.
sonar.exclusions=frontend/**,venv/**,.venv/**,env/**,**/__pycache__/**,**/*.pyc,**/*.db,**/*.sqlite3

# ─────────────────────────────────────────────────────────────
#  Cobertura de pruebas
# ─────────────────────────────────────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml

# ─────────────────────────────────────────────────────────────
#  Pruebas (habilitar cuando exista la carpeta de tests)
# ─────────────────────────────────────────────────────────────
# sonar.tests=backend/tests
# sonar.test.inclusions=**/test_*.py,**/*_test.py
