<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Docente | UCT - Solicitud de Sala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0A2540] text-white flex flex-col hidden md:flex">
        <div class="p-6 flex items-center justify-center border-b border-blue-800">
            <div class="text-2xl font-bold tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-building-columns text-yellow-500"></i>
                UCT<span class="text-sm font-normal text-gray-300">Docente</span>
            </div>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-blue-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-house w-5"></i> Inicio
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-800 rounded-lg text-white font-medium transition-colors">
                <i class="fa-solid fa-chalkboard-user w-5"></i> Solicitud de Salas
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-blue-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-users w-5"></i> Mis Cursos
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-blue-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-users w-5"></i> Mis Solicitudes
            </a>
        </nav>
        <div class="p-4 border-t border-blue-800">
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:text-red-400 transition-colors">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white shadow-sm border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-semibold text-gray-800">Gestión de Espacios</h1>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 border-l pl-6">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-semibold text-gray-800">Dr. Roberto Silva</p>
                        <p class="text-xs text-gray-500">Facultad de Ingeniería</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-900 font-bold border-2 border-blue-900">
                        RS
                    </div>
                </div>
            </div>
        </header>

        <div class="p-8 max-w-3xl mx-auto w-full">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-900">Nueva Solicitud de Sala</h2>
                <p class="text-gray-600 mt-1">Complete los datos para requerir un espacio físico para sus clases o evaluaciones.</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <form id="formularioSala" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-1 md:col-span-2">
                            <label for="curso" class="block text-sm font-medium text-gray-700 mb-1">Curso / Asignatura</label>
                            <input type="text" id="curso" name="curso" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0A2540] focus:border-[#0A2540] outline-none transition" placeholder="Ej: Arquitectura de Software INFO-045">
                        </div>

                        <div>
                            <label for="aforo" class="block text-sm font-medium text-gray-700 mb-1">Aforo Estimado (Estudiantes)</label>
                            <input type="number" id="aforo" name="aforo" min="1" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0A2540] focus:border-[#0A2540] outline-none transition" placeholder="Ej: 45">
                        </div>

                        <div>
                            <label for="horario" class="block text-sm font-medium text-gray-700 mb-1">Bloque Horario</label>
                            <select id="horario" name="horario" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0A2540] focus:border-[#0A2540] outline-none transition bg-white">
                                <option value="">Seleccione un bloque...</option>
                                <option value="08:30-10:00">Bloque 1 (08:30 - 10:00)</option>
                                <option value="10:15-11:45">Bloque 2 (10:15 - 11:45)</option>
                                <option value="12:00-13:30">Bloque 3 (12:00 - 13:30)</option>
                                <option value="14:30-16:00">Bloque 4 (14:30 - 16:00)</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex items-center bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <input id="accesibilidad" name="accesibilidad" type="checkbox" class="w-5 h-5 text-[#0A2540] bg-white border-gray-300 rounded focus:ring-[#0A2540] cursor-pointer">
                        <label for="accesibilidad" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">
                            Requerimientos de accesibilidad universal <span class="block text-xs text-gray-500 font-normal mt-0.5">(Rampas, ascensores, primer piso)</span>
                        </label>
                    </div>

                    <div id="mensajeResultado" class="hidden rounded-lg p-4 text-sm font-medium"></div>

                    <div class="flex justify-end pt-4 border-t border-gray-100">
                        <button type="submit" id="btnEnviar" class="px-6 py-2.5 bg-[#0A2540] hover:bg-blue-900 text-white font-medium rounded-lg transition-colors flex items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i> Enviar Solicitud
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
